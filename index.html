<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Image Search</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #results { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .img-card { width: 200px; border: 1px solid #ddd; padding: 5px; border-radius: 8px; }
        img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Image Scraper Search</h1>
    <input type="text" id="query" placeholder="Search for something (e.g. Pizza)">
    <button onclick="searchImages()">Search</button>

    <div id="results"></div>

    <script>
        async function searchImages() {
            const query = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');
            
            if (!query) return alert("Type something first!");

            resultsDiv.innerHTML = "Searching... please wait (Puppeteer is waking up)";

            try {
                // We fetch from our LOCAL server, not Google directly
                const response = await fetch(`http://localhost:3000/search?q=${query}`);
                const data = await response.json();

                resultsDiv.innerHTML = ""; // Clear loading text

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    card.innerHTML = `
                        <img src="${item.url}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/150'">
                        <p style="font-size: 12px;">${item.title.substring(0, 30)}...</p>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (err) {
                resultsDiv.innerHTML = "Error fetching images. Is the server running?";
            }
        }
    </script>
</body>
</html>
